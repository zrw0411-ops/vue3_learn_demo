server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oa_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.oa.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: oa-system-secret-key-2024-very-long-and-secure
  expiration: 86400000  # 24小时

logging:
  level:
    com.oa: debug
