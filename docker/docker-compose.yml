version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: oa-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: oa_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/oa-system.sql:/docker-entrypoint-initdb.d/1-init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - oa-net

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: oa-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/oa_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - oa-net

  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    container_name: oa-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - oa-net

volumes:
  mysql_data:

networks:
  oa-net:
    driver: bridge
